MODEL_NAME: jigsaw_1x8_128_512_250e_cosine_asm-pairs_4000pcs_0p025CRITHRESHOLD
MODULE: jigsaw
PROJECT: jigsaw

DATASET: custom.all_piece_matching

GPUS: [0]
BATCH_SIZE: 8
NUM_WORKERS: 8

FP16: True

TRAIN:
  NUM_EPOCHS: 250
  LR: 0.0005
  WEIGHT_DECAY: 0.
  WARMUP_RATIO: 0.02
  LR_SCHEDULER: 'cosine'
  LR_DECAY: 100.
  VAL_EVERY: 5
  CLIP_GRAD: 1.0

CALLBACK:
  CHECKPOINT_MONITOR: val/mat_f1
  CHECKPOINT_MODE: max

DATA:  # you shall use DATA instead of upper_case_dataset_name
  DATA_DIR: '/data/yan/pose_dataset/multi_asm/NOCS/{}'
  SUBSET: everyday
  DATA_FN: '{}_valid_pcs_list.txt' 
  MAX_NUM_PART: 16
  NUM_PC_POINTS: 4000
  SAMPLE_BY: area
  MIN_PART_POINT: 30
  FRACTURE_LABEL_THRESHOLD: 0.025

MODEL:  # you shall use MODEL instead of upper_case_module_name
  ENCODER: pointnet2_pt.msg.dynamic

# STATS is for eval
#STATS: "./results/jigsaw_4x4_128_512_250e_cosine_everyday/stats/eval"

